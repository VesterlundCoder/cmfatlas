<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Compare — CMF Annotator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{font-family:'Inter',sans-serif}
    body{background:#f8fafc;color:#101010}
    .nav-link{color:#555;font-size:14px;font-weight:500;transition:color .15s;text-decoration:none}
    .nav-link:hover,.nav-link.active{color:#0bb4aa}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05);padding:20px}
    .input{border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;width:100%;background:#fff;transition:border-color .15s}
    .input:focus{border-color:#0bb4aa;box-shadow:0 0 0 3px rgba(11,180,170,.1)}
    .btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s}
    .btn-primary{background:#0bb4aa;color:#fff}
    .btn-primary:hover{background:#09a09a}
    .btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
    .btn-outline{background:#fff;color:#475569;border:1px solid #e2e8f0}
    .btn-outline:hover{border-color:#0bb4aa;color:#0bb4aa}
    .check-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:13px}
    .check-row:last-child{border-bottom:none}
    .check-yes{color:#059669;font-weight:700}
    .check-no{color:#dc2626;font-weight:700}
    .check-partial{color:#b45309;font-weight:700}
    .check-unknown{color:#94a3b8}
    .score-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden;margin-top:4px}
    .score-fill{height:100%;border-radius:4px;transition:width .5s}
    .judgment-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid #e2e8f0;background:#fff;font-family:inherit;transition:all .15s}
    .judgment-btn.selected{border-color:#0bb4aa;background:#f0fdfc;color:#0bb4aa}
    .judgment-btn:hover:not(.selected){border-color:#94a3b8}
    .textarea{border:1px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;font-family:inherit;width:100%;resize:vertical;transition:border-color .15s;background:#fff}
    .textarea:focus{border-color:#0bb4aa;box-shadow:0 0 0 3px rgba(11,180,170,.1)}
    .ann-panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px}
    .ann-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f1f5f9}
    .ann-row:last-child{border-bottom:none}
    .section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin:16px 0 8px}
  </style>
</head>
<body class="min-h-screen">

<nav style="background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between" style="height:60px">
    <a href="index.html" style="font-weight:800;font-size:18px;color:#101010;text-decoration:none;letter-spacing:-0.5px">
      CMF <span style="color:#0bb4aa">Atlas</span>
      <span style="color:#94a3b8;font-size:13px;font-weight:400;margin-left:8px">/ Compare</span>
    </a>
    <div class="flex items-center gap-6">
      <a href="annotate_queue.html" class="nav-link">Queue</a>
      <a href="annotate_review.html" class="nav-link">Review</a>
      <a href="annotate_compare.html" class="nav-link active">Compare</a>
      <a href="annotate_protocol.html" class="nav-link">Protocol</a>
      <button id="logout-btn" style="font-size:13px;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- CMF ID picker -->
  <div class="card mb-6">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:16px">Select two annotated CMFs to compare</h2>
    <div class="flex items-center gap-4 flex-wrap">
      <div>
        <label style="font-size:11px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">CMF A — ID</label>
        <input id="id-a" class="input" type="number" placeholder="e.g. 101" style="width:140px"/>
      </div>
      <div style="font-size:20px;color:#94a3b8;margin-top:16px">vs</div>
      <div>
        <label style="font-size:11px;font-weight:700;color:#94a3b8;display:block;margin-bottom:4px">CMF B — ID</label>
        <input id="id-b" class="input" type="number" placeholder="e.g. 204" style="width:140px"/>
      </div>
      <div style="margin-top:16px">
        <button id="compare-btn" class="btn btn-primary">Compare →</button>
      </div>
    </div>
    <p id="load-error" style="color:#dc2626;font-size:12px;margin-top:8px;display:none"></p>
  </div>

  <!-- Comparison panel (hidden until loaded) -->
  <div id="comparison-panel" style="display:none">
    <div class="grid grid-cols-3 gap-5 mb-6">
      <!-- CMF A -->
      <div class="card" id="panel-a">
        <div class="section-head">CMF A</div>
        <div id="ann-a-content"></div>
      </div>

      <!-- Auto comparison -->
      <div class="card" style="background:#f8fafc">
        <div class="section-head">Automatic comparison</div>
        <div id="auto-checks"></div>
        <div style="margin-top:14px">
          <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:4px">Surface similarity</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="score-bar" style="flex:1"><div class="score-fill" id="surface-fill" style="background:#0bb4aa"></div></div>
            <span id="surface-score" style="font-size:14px;font-weight:800;color:#0bb4aa">—</span>
          </div>
        </div>
        <div style="margin-top:10px">
          <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:4px">Family similarity</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="score-bar" style="flex:1"><div class="score-fill" id="family-fill" style="background:#7c3aed"></div></div>
            <span id="family-score" style="font-size:14px;font-weight:800;color:#7c3aed">—</span>
          </div>
        </div>
        <div style="margin-top:12px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;padding-top:10px">
          85–100: strong structural match<br>
          65–84: plausible family<br>
          45–64: weak / partial<br>
          0–44: probably unrelated
        </div>
      </div>

      <!-- CMF B -->
      <div class="card" id="panel-b">
        <div class="section-head">CMF B</div>
        <div id="ann-b-content"></div>
      </div>
    </div>

    <!-- Human judgment -->
    <div class="card">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Human judgment</h3>
      <div class="flex items-center gap-3 flex-wrap mb-4">
        <button class="judgment-btn" data-val="likely_same_family">Likely same family</button>
        <button class="judgment-btn" data-val="possibly_related">Possibly related</button>
        <button class="judgment-btn" data-val="probably_unrelated">Probably unrelated</button>
        <button class="judgment-btn" data-val="unsure">Unsure</button>
      </div>
      <div class="mb-4">
        <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Why? <span style="color:#94a3b8;font-weight:400">(required)</span></label>
        <textarea id="rationale" class="textarea" rows="3" placeholder="e.g. same size and broad rational structure, but denominator behavior differs in K2"></textarea>
      </div>
      <div class="flex items-center gap-6 mb-5">
        <div>
          <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Confidence (1–5)</label>
          <div class="flex items-center gap-2" id="conf-picker">
            <button class="judgment-btn" data-conf="1">1</button>
            <button class="judgment-btn" data-conf="2">2</button>
            <button class="judgment-btn" data-conf="3">3</button>
            <button class="judgment-btn" data-conf="4">4</button>
            <button class="judgment-btn" data-conf="5">5</button>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="save-comparison-btn" class="btn btn-primary">Save comparison</button>
        <span id="save-msg" style="font-size:13px;color:#059669;display:none">✓ Saved</span>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'https://cmfatlas-production.up.railway.app';
let annA = null, annB = null, autoResult = null;
let selectedJudgment = null, selectedConf = null;

function annPanel(ann, cmfId) {
  if (!ann || !ann.id) {
    return `<div style="color:#dc2626;font-size:13px">No annotation found for CMF #${cmfId}.<br>
      <a href="annotate_cmf.html?id=${cmfId}" style="color:#0bb4aa">Annotate it first →</a></div>`;
  }
  const vars = tryParseList(ann.visible_variables);
  return `
    <a href="annotate_cmf.html?id=${ann.cmf_id}" style="font-size:14px;font-weight:800;color:#0bb4aa;text-decoration:none">CMF #${ann.cmf_id}</a>
    <div class="ann-row"><span style="color:#94a3b8">Matrices</span><strong>${ann.matrix_count||'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Signature</span><strong style="font-family:monospace;font-size:11px">${ann.matrix_size_signature||'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Variables</span><strong>${vars.join(', ')||'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Var count</span><strong>${ann.visible_variable_count??'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Denominator</span><strong>${ann.has_denominator?'yes':'no'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Var in denom</span><strong>${ann.has_variable_in_denominator?'yes':'no'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Max exponent</span><strong>${ann.highest_visible_exponent??'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Num degree</span><strong>${ann.highest_numerator_total_degree??'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Den degree</span><strong>${ann.highest_denominator_total_degree??'—'}</strong></div>
    <div class="ann-row"><span style="color:#94a3b8">Confidence</span><strong>${ann.confidence||'—'}/5</strong></div>
    ${ann.notes ? `<div style="margin-top:8px;font-size:11px;color:#64748b;font-style:italic">${ann.notes}</div>` : ''}
  `;
}

function checkMark(val) {
  if (val === true || val === 1) return '<span class="check-yes">✓ yes</span>';
  if (val === false || val === 0) return '<span class="check-no">✗ no</span>';
  if (val === 'yes') return '<span class="check-yes">✓ yes</span>';
  if (val === 'no') return '<span class="check-no">✗ no</span>';
  if (val === 'partial') return '<span class="check-partial">~ partial</span>';
  return '<span class="check-unknown">—</span>';
}

function renderAutoChecks(r) {
  const checks = [
    ['Matrix count', r.same_matrix_count],
    ['Size signature', r.same_size_signature],
    ['Variable count', r.same_variable_count_profile],
    ['Denominator profile', r.same_denominator_profile],
    ['Var-in-denom profile', r.same_variable_in_denominator_profile],
    ['Exponent profile', r.same_highest_exponent_profile],
    ['Degree profile', r.same_degree_profile],
  ];
  return checks.map(([label, val]) => `
    <div class="check-row">
      <span>${label}</span>
      ${checkMark(val)}
    </div>
  `).join('');
}

function tryParseList(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; } catch { return []; }
}

async function doCompare() {
  const idA = parseInt(document.getElementById('id-a').value);
  const idB = parseInt(document.getElementById('id-b').value);
  const errEl = document.getElementById('load-error');
  errEl.style.display='none';
  if (!idA || !idB) { errEl.textContent='Enter both CMF IDs.'; errEl.style.display='block'; return; }
  if (idA === idB) { errEl.textContent='Choose two different CMFs.'; errEl.style.display='block'; return; }

  document.getElementById('compare-btn').disabled = true;
  document.getElementById('compare-btn').textContent = 'Loading…';

  try {
    const [rA, rB] = await Promise.all([
      fetch(API+`/annotate/annotation/by-cmf/${idA}`, {credentials:'include', headers:{'X-Token': localStorage.getItem('annotator_token')||''}}),
      fetch(API+`/annotate/annotation/by-cmf/${idB}`, {credentials:'include', headers:{'X-Token': localStorage.getItem('annotator_token')||''}}),
    ]);
    if (rA.status===401) { window.location.href='annotate_login.html'; return; }
    annA = await rA.json();
    annB = await rB.json();

    document.getElementById('ann-a-content').innerHTML = annPanel(annA.id ? annA : null, idA);
    document.getElementById('ann-b-content').innerHTML = annPanel(annB.id ? annB : null, idB);

    if (annA.id && annB.id) {
      const rSim = await fetch(API+'/annotate/similarity', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json', 'X-Token': localStorage.getItem('annotator_token')||''},
        body: JSON.stringify({ann_a: annA, ann_b: annB}),
      });
      autoResult = await rSim.json();
      document.getElementById('auto-checks').innerHTML = renderAutoChecks(autoResult);
      const ss = autoResult.surface_similarity_score || 0;
      const fs = autoResult.family_similarity_score || 0;
      document.getElementById('surface-score').textContent = ss;
      document.getElementById('family-score').textContent = fs;
      document.getElementById('surface-fill').style.width = ss+'%';
      document.getElementById('family-fill').style.width = fs+'%';
    } else {
      document.getElementById('auto-checks').innerHTML = '<div style="color:#94a3b8;font-size:12px">Need both annotations to auto-compare.</div>';
    }

    document.getElementById('comparison-panel').style.display = 'block';
    window.scrollTo({top: 300, behavior:'smooth'});
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display='block';
  } finally {
    document.getElementById('compare-btn').disabled = false;
    document.getElementById('compare-btn').textContent = 'Compare →';
  }
}

document.getElementById('compare-btn').addEventListener('click', doCompare);

// Judgment picker
document.querySelectorAll('.judgment-btn[data-val]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.judgment-btn[data-val]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedJudgment = btn.dataset.val;
  });
});
document.querySelectorAll('.judgment-btn[data-conf]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.judgment-btn[data-conf]').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedConf = parseInt(btn.dataset.conf);
  });
});

document.getElementById('save-comparison-btn').addEventListener('click', async () => {
  if (!selectedJudgment) { alert('Select a human judgment.'); return; }
  const rationale = document.getElementById('rationale').value.trim();
  if (!rationale) { alert('Add a short rationale.'); return; }
  const idA = parseInt(document.getElementById('id-a').value);
  const idB = parseInt(document.getElementById('id-b').value);
  const payload = {
    cmf_a_id: idA, cmf_b_id: idB,
    human_judgment: selectedJudgment,
    rationale,
    confidence: selectedConf,
    ...(autoResult || {}),
  };
  try {
    const r = await fetch(API+'/annotate/comparison', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json','X-Token': localStorage.getItem('annotator_token')||''},
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error((await r.json()).detail);
    const msg = document.getElementById('save-msg');
    msg.style.display='inline'; setTimeout(()=>msg.style.display='none', 3000);
  } catch(e) { alert('Save failed: '+e.message); }
});

// Parse URL params to pre-fill IDs
const sp = new URLSearchParams(window.location.search);
if (sp.get('a')) document.getElementById('id-a').value = sp.get('a');
if (sp.get('b')) document.getElementById('id-b').value = sp.get('b');
if (sp.get('a') && sp.get('b')) setTimeout(doCompare, 200);

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch(API+'/annotate/logout', {method:'POST',credentials:'include'});
  localStorage.clear(); window.location.href='annotate_login.html';
});

(async () => {
  const token = localStorage.getItem('annotator_token');
  if (!token) { window.location.href='annotate_login.html'; return; }
})();
</script>
</body>
</html>
