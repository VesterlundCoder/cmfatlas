    .code-block{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;font-family:monospace;font-size:12px;line-height:1.6;overflow-x:auto;color:#334155}
    .bibtex-block{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;font-family:monospace;font-size:12px;line-height:1.7;white-space:pre;overflow-x:auto;color:#334155}
    .copy-btn{background:#fff;border:1px solid #e2e8f0;color:#555;padding:5px 14px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}

  </style>

<div class="max-w-5xl mx-auto px-6 py-8" id="main-content">
  <div style="color:#aaa;font-size:13px;padding:48px;text-align:center">Loading entry…</div>
</div>

<script>
const API = 'https://cmfatlas-production.up.railway.app';

function polyToLatex(s) {
  if (!s) return '';
  s = s.replace(/\*\*(\d+)/g, (_, e) => `^{${e}}`);
  s = s.replace(/(-?\d+)\*([a-zA-Z])/g, '$1$2');
  s = s.replace(/([a-zA-Z\}])\*([a-zA-Z])/g, '$1$2');
  return s;
}

function certBadge(c) {
  if (!c) return '<span class="badge badge-grey">Unknown</span>';
  const map = {
    'A_plus':            '<span class="badge" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d">A+ — Manually Verified</span>',
    'A_certified':       '<span class="badge badge-green">A — Formally Certified</span>',
    'B_verified_numeric':'<span class="badge badge-teal">B — Numerically Verified</span>',
    'C_scouting':        '<span class="badge badge-amber">C — Scouting</span>',
  };
  return map[c] || `<span class="badge badge-grey">${c}</span>`;
}

function renderMatrices(matrices) {
  if (!matrices || !matrices.length) return '<div style="color:#aaa;font-size:13px;padding:8px 0">No matrix representation available.</div>';
  const axisNames = {'k':'k','m':'m','x':'x','y':'y','a':'a','b':'b','c':'c','d':'d'};
  const parts = matrices.map(mx => {
    const rows = mx.rows;
    const n = rows.length;
    const m = rows[0].length;
    // Build pmatrix LaTeX — use smallmatrix for entries to keep size manageable
    const rowsLatex = rows.map(r => r.join(' & ')).join(' \\\\ ');
    const label = mx.label || `K${mx.index}`;
    const axisVars = matrices.map(mm => mm.axis).join(',');
    const varList = matrices.length === 2 ? '(k,m)' : '(' + matrices.map(mm=>mm.axis).join(',') + ')';
    return `
      <div style="margin-bottom:24px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px">
          ${label}${varList} — ${mx.axis.toUpperCase()} step matrix
          ${mx.source === 'explicit' ? '<span style="margin-left:8px;font-size:9px;background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9;padding:1px 6px;border-radius:9999px;font-weight:600;text-transform:none">explicit</span>' : '<span style="margin-left:8px;font-size:9px;background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;padding:1px 6px;border-radius:9999px;font-weight:600;text-transform:none">computed</span>'}
        </div>
        <div style="overflow-x:auto;font-size:13px;color:#222">
          \\[${label}${varList} = \\begin{pmatrix} ${rowsLatex} \\end{pmatrix}\\]
        </div>
      </div>`;
  });

  // Flatness conditions
  const mxLabels = matrices.map(mx => mx.label || `K${mx.index}`);
  let flatness = '';
  if (matrices.length === 2) {
    flatness = `\\(${mxLabels[0]}(k,m) \\cdot ${mxLabels[1]}(k{+}1,m) = ${mxLabels[1]}(k,m) \\cdot ${mxLabels[0]}(k,m{+}1)\\)`;
  } else if (matrices.length >= 3) {
    const pairs = [];
    for (let i = 0; i < matrices.length; i++)
      for (let j = i+1; j < matrices.length; j++)
        pairs.push(`\\(${mxLabels[i]} \\cdot ${mxLabels[j]} = ${mxLabels[j]} \\cdot ${mxLabels[i]}\\) (shifted)`);
    flatness = pairs.join(' &nbsp;&nbsp; ');
  }

  return `<div class="space-y-2">${parts.join('')}
    <div style="font-size:12px;color:#666;border:1px solid #e2e8f0;border-radius:8px;padding:12px;background:#f8fafc;margin-top:8px">
      <strong style="color:#333">Flatness condition:</strong> ${flatness}
    </div>
  </div>`;
}

function buildBibTeX(id, f_poly, dim) {
  const year = new Date().getFullYear();
  const slug = `cmf${id}`;
  return `@misc{vesterlund${year}cmf${id},
  author    = {Vesterlund, David},
  title     = {{CMF Atlas} Entry \\#${id}: ${f_poly ? f_poly.substring(0,40) : `Dimension ${dim} CMF`}},
  year      = {${year}},
  url       = {https://davidvesterlund.com/cmf-atlas/entry.html?id=${id}},
  note      = {CMF Atlas v2.2, Conservative Matrix Field Database},
  license   = {CC BY 4.0}
}`;
}

async function loadEntry() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('main-content').innerHTML =
      '<div class="text-red-400 py-12 text-center">No CMF ID specified. Use <code>?id=N</code> in the URL.</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/cmfs/${id}/full`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    document.title = `CMF #${d.id} — CMF Atlas`;
    const hasFormula = !!d.f_poly;
    const fpL = polyToLatex(d.f_poly);
    const fbL = polyToLatex(d.fbar_poly);
    const bibtex = buildBibTeX(d.id, d.f_poly, d.dimension);

    document.getElementById('main-content').innerHTML = `
      <!-- Breadcrumb -->
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#888;margin-bottom:24px">
        <a href="browse.html" style="color:#0bb4aa;text-decoration:none;font-weight:500">Browse</a>
        <span>›</span>
        <span style="color:#333">CMF #${d.id}</span>
      </div>

      <!-- Header -->
      <div style="background:linear-gradient(135deg,#f0fdfc 0%,#fff 60%);border:1px solid #e2e8f0;border-radius:16px;padding:28px 28px 24px;margin-bottom:24px">
        <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px">
          <div>
            <h1 style="font-size:2rem;font-weight:800;color:#101010;margin-bottom:10px;letter-spacing:-0.5px">CMF #${d.id}</h1>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
              <span class="badge badge-teal">${d.dimension}D</span>
              ${certBadge(d.certification_level)}
              ${d.flatness_verified ? '<span class="badge badge-green">✓ Flatness Verified</span>' : ''}
              ${d.symbolic_verification?.result === 'PASS' ? '<span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac">🔬 Symbolically Proven</span>' : ''}
              ${hasFormula ? '<span class="badge" style="background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9">▶ Walkable</span>' : ''}
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${hasFormula ? `<a href="explorer.html?id=${d.id}" style="background:#0bb4aa;color:#fff;font-weight:600;padding:9px 18px;border-radius:8px;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px">▶ Matrix Walk</a>` : ''}
            ${hasFormula ? `<a href="conservative-test.html?id=${d.id}" style="border:2px solid #0bb4aa;color:#0bb4aa;font-weight:600;padding:8px 16px;border-radius:8px;font-size:13px;text-decoration:none;background:#fff">Path Independence</a>` : ''}
          </div>
        </div>
      </div>

      <!-- Main grid -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">

        <!-- Left: Math -->
        <div class="lg:col-span-2 space-y-5">

          <!-- Polynomial form -->
          ${hasFormula ? `
          <div class="card p-6">
            <div class="section-label">Polynomial Form</div>
            <div style="font-size:1.4rem;text-align:center;padding:16px 0;color:#333">
              \\[f(${d.is_3d ? 'x,y,z' : 'x,y'}) = ${fpL}\\]
            </div>
            ${d.fbar_poly ? `<div style="font-size:1.1rem;text-align:center;color:#666">\\[\\bar{f}(${d.is_3d ? 'x,y,z' : 'x,y'}) = ${fbL}\\]</div>` : ''}
            <details style="margin-top:16px">
              <summary style="font-size:12px;color:#888;cursor:pointer">Raw machine syntax</summary>
              <div class="code-block" style="margin-top:8px">
                <div>f(${d.is_3d?'x,y,z':'x,y'}) = <span style="color:#059669">${d.f_poly}</span></div>
                ${d.fbar_poly ? `<div>f̄(${d.is_3d?'x,y,z':'x,y'}) = <span style="color:#059669">${d.fbar_poly}</span></div>` : ''}
              </div>
            </details>
          </div>
          ` : `
          <div class="card p-6">
            <div class="section-label">Polynomial Form</div>
            <div style="color:#888;font-size:13px;font-style:italic;padding:16px 0">No explicit polynomial form — this CMF is defined via matrix entries or pFq hypergeometric structure.</div>
            ${d.description ? `<p style="font-size:13px;color:#555;line-height:1.6">${d.description}</p>` : ''}
          </div>
          `}

          <!-- Matrix structure -->
          ${d.matrices && d.matrices.length ? `
          <div class="card p-6">
            <div class="section-label">K-Matrix Structure</div>
            ${renderMatrices(d.matrices)}
          </div>
          ` : ''}

          <!-- Symbolic verification / certification panel -->
          ${hasFormula && !d.is_3d ? `
          <div class="card p-6" id="symverify-card">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
              <div>
                <div class="section-label" style="margin-bottom:4px">Symbolic Flatness Proof</div>
                <div style="font-size:12px;color:#888">Exact polynomial arithmetic — no numerical approximation</div>
              </div>
              ${d.symbolic_verification?.result === 'PASS' || d.certification_level === 'A_certified'
                ? `<span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac">✓ Already certified</span>`
                : `<button id="symverify-btn" onclick="runSymVerify(${d.id})" style="background:#0bb4aa;color:#fff;font-weight:700;padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;gap:6px">🔬 Verify Symbolically</button>`
              }
            </div>
            ${d.symbolic_verification?.result === 'PASS' ? `
            <div id="symverify-steps" style="margin-top:16px">
              <div style="font-size:12px;color:#15803d;padding:10px 14px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac">
                ✓ Proved flat in QQ[k,m] · SageMath ${d.symbolic_verification.sage_version?.match(/\\d+\\.\\d+/)?.[0] || ''} · ${d.symbolic_verification.verified_at?.substring(0,10) || ''}
              </div>
            </div>` : '<div id="symverify-steps" style="margin-top:0"></div>'}
          </div>
          ` : ''}

          <!-- 3D CMF Hunter certification panel -->
          ${d.is_3d ? `
          <div class="card p-6" style="border:1px solid #b2ede9;background:linear-gradient(135deg,#f0fdfc,#fff)">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
              <div>
                <div class="section-label" style="margin-bottom:4px;color:#0bb4aa">3D CMF — CMF Hunter Certification</div>
                <div style="font-size:12px;color:#888">Numerically certified by CMF Hunter (B-level)</div>
              </div>
              <span class="badge badge-teal">✓ B-verified numeric</span>
            </div>
            <div style="margin-top:12px;font-size:12px;color:#555;line-height:1.8">
              <div>This 3D CMF is certified path-independent by CMF Hunter's own numerical B-level verification.</div>
              <div style="margin-top:6px;color:#888">The walk and path-independence test below use a telescope formula approximation — large residuals are <em>expected</em> and do not invalidate this CMF.</div>
            </div>
          </div>
          ` : ''}

          <!-- Representation -->
          <div class="card p-6">
            <div class="section-label">Representation</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;font-size:13px">
              <div><span style="color:#888">Group:</span> <span style="color:#333;font-weight:500">${d.representation?.primary_group || '—'}</span></div>
              <div><span style="color:#888">Source type:</span> <span style="color:#333;font-weight:500">${d.representation?.source_type || '—'}</span></div>
              <div><span style="color:#888">Conjugacy:</span> <span style="color:#333;font-family:monospace">${d.representation?.conjugacy || '(none)'}</span></div>
              <div><span style="color:#888">Monomials:</span> <span style="color:#333">${d.representation?.n_monomials ?? '—'}</span></div>
            </div>
            <div style="margin-top:12px;font-size:11px;color:#aaa;font-family:monospace">Fingerprint: ${d.representation?.canonical_fingerprint || '—'}</div>
          </div>

          <!-- Provenance -->
          <div class="card p-6">
            <div class="section-label">Provenance</div>
            <div style="font-size:13px;line-height:1.8">
              <div><span style="color:#888">Series:</span> <span style="color:#333;font-family:monospace">${d.series?.name || '—'}</span></div>
              <div><span style="color:#888">Generator type:</span> <span style="color:#333">${d.series?.generator_type || '—'}</span></div>
              <div><span style="color:#888">Provenance:</span> <span style="color:#666;font-size:12px">${d.series?.provenance || '—'}</span></div>
            </div>
          </div>
        </div>

        <!-- Right: Metadata + Citation -->
        <div class="space-y-5">

          <!-- Key metadata -->
          <div class="card p-5">
            <div class="section-label">Metadata</div>
            <div>
              <div class="meta-row">
                <span style="color:#888">Primary Constant</span>
                <span style="color:#b45309;font-weight:600">${d.primary_constant || '—'}</span>
              </div>
              <div class="meta-row">
                <span style="color:#888">Dimension</span>
                <span style="color:#333;font-weight:500">${d.dimension}D</span>
              </div>
              <div class="meta-row">
                <span style="color:#888">Degree</span>
                <span style="color:#333">${d.degree ?? '—'}</span>
              </div>
              <div class="meta-row">
                <span style="color:#888">Certification</span>
                ${certBadge(d.certification_level)}
              </div>
              <div class="meta-row">
                <span style="color:#888">Flatness</span>
                <span style="color:${d.flatness_verified?'#059669':'#aaa'}">${d.flatness_verified?'✓ Verified':'Not verified'}</span>
              </div>
              ${d.symbolic_verification ? `
              <div class="meta-row">
                <span style="color:#888">Symbolic proof</span>
                <span style="color:#15803d;font-size:12px">✓ SageMath ${d.symbolic_verification.sage_version?.match(/\d+\.\d+/)?.[0] || ''}</span>
              </div>` : ''}
              <div class="meta-row">
                <span style="color:#888">Source</span>
                <span style="color:#555;font-size:12px">${d.source || '—'}</span>
              </div>
              <div class="meta-row">
                <span style="color:#888">Added</span>
                <span style="color:#aaa;font-size:12px">${d.created_at ? d.created_at.substring(0,10) : '—'}</span>
              </div>
            </div>
          </div>

          <!-- Stable URL -->
          <div class="card p-5">
            <div class="section-label">Stable URL</div>
            <div class="code-block" style="font-size:11px;word-break:break-all;color:#0bb4aa">
              https://davidvesterlund.com/cmf-atlas/entry.html?id=${d.id}
            </div>
            <button class="copy-btn" style="margin-top:8px;width:100%" onclick="copyText('https://davidvesterlund.com/cmf-atlas/entry.html?id=${d.id}',this)">
              Copy URL
            </button>
          </div>

          <!-- Citation -->
          <div class="card p-5">
            <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
              <span>BibTeX Citation</span>
              <button class="copy-btn" id="bibtex-copy-btn" onclick="copyBibTeX()">Copy</button>
            </div>
            <pre class="bibtex-block" style="margin-top:12px;font-size:11px" id="bibtex-block">${bibtex}</pre>
          </div>

          <!-- Features -->
          ${d.features && Object.keys(d.features).length ? `
          <div class="card p-5">
            <div class="section-label">Complexity Features</div>
            <div style="font-size:12px;color:#555;line-height:2">
              ${d.features.complexity_score !== undefined ? `<div>Complexity score: <strong style="color:#333">${d.features.complexity_score?.toFixed(3)}</strong></div>` : ''}
              ${d.features.d_finite_rank_proxy !== undefined ? `<div>D-finite rank proxy: <strong style="color:#333">${d.features.d_finite_rank_proxy}</strong></div>` : ''}
              ${d.features.rec_order !== undefined ? `<div>Recurrence order: <strong style="color:#333">${d.features.rec_order}</strong></div>` : ''}
            </div>
          </div>
          ` : ''}

          <!-- Symbolic verification / A-certified certificate -->
          ${d.symbolic_verification || d.certification_level === 'A_certified' || d.certification_level === 'A_plus' ? `
          <div class="card p-5" style="border:1px solid #86efac;background:linear-gradient(135deg,#f0fdf4,#fff)">
            <div class="section-label" style="color:#15803d">🔬 Symbolic Verification Certificate</div>
            <div style="font-size:12px;color:#555;line-height:2;margin-top:4px">
              <div><span style="color:#888">Result:</span> <strong style="color:#15803d">✓ PASS — Flatness proven exactly</strong></div>
              ${d.symbolic_verification ? `
              <div><span style="color:#888">Method:</span> <span style="color:#333">${d.symbolic_verification.mode === 'poly' ? 'Exact polynomial arithmetic in QQ[k,m' + (d.is_3d ? ',n' : '') + ']' : 'simplify_rational() in SR'}</span></div>
              <div><span style="color:#888">System:</span> <span style="color:#333">SageMath ${d.symbolic_verification.sage_version?.replace('SageMath version ','')?.split(',')[0] || ''}</span></div>
              <div><span style="color:#888">Verified:</span> <span style="color:#aaa">${d.symbolic_verification.verified_at ? d.symbolic_verification.verified_at.substring(0,10) : '—'}</span></div>
              <div style="margin-top:6px;font-size:11px;color:#888;font-style:italic">${d.symbolic_verification.detail || ''}</div>
              ` : `
              <div><span style="color:#888">Method:</span> <span style="color:#333">Symbolic + algebraic readout (A_certified)</span></div>
              <div><span style="color:#888">Flatness:</span> <span style="color:#333">${d.flatness_verified ? '✓ Verified' : 'Certified by construction'}</span></div>
              `}
            </div>
          </div>
          ` : ''}
        </div>
      </div>
    `;

    if (window.MathJax) MathJax.typesetPromise([document.getElementById('main-content')]);

  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="text-red-400 py-12 text-center">Failed to load entry: ${e.message}</div>`;
  }
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = '#0bb4aa';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

function copyBibTeX() {
  const text = document.getElementById('bibtex-block').textContent;
  const btn = document.getElementById('bibtex-copy-btn');
  copyText(text, btn);
}

async function runSymVerify(cmfId) {
  const btn = document.getElementById('symverify-btn');
  const stepsDiv = document.getElementById('symverify-steps');
  if (!btn || !stepsDiv) return;

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Computing…';
  stepsDiv.innerHTML = '<div style="color:#aaa;font-size:12px;padding:8px 0">Running sympy — exact polynomial arithmetic in ℚ[k,m]…</div>';

  try {
    const res = await fetch(`${API}/cmfs/${cmfId}/verify-steps`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const d = await res.json();

    stepsDiv.innerHTML = '';
    stepsDiv.style.marginTop = '20px';

    // Reveal steps one by one
    for (let i = 0; i < d.steps.length; i++) {
      await new Promise(r => setTimeout(r, i === 0 ? 0 : 320));
      const step = d.steps[i];
      const isResult = step.result === 'PASS' || step.result === 'FAIL' || step.result === 'PENDING';
      const bg = step.result === 'PASS' ? '#f0fdf4' : step.result === 'FAIL' ? '#fef2f2' : '#f8fafc';
      const border = step.result === 'PASS' ? '#86efac' : step.result === 'FAIL' ? '#fca5a5' : '#e2e8f0';
      const color = step.result === 'PASS' ? '#15803d' : step.result === 'FAIL' ? '#dc2626' : '#64748b';

      const el = document.createElement('div');
      el.style.cssText = `opacity:0;transition:opacity .3s ease;margin-bottom:14px;padding:12px 16px;border-radius:8px;border:1px solid ${border};background:${bg}`;
      el.innerHTML = `
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${isResult ? color : '#888'};margin-bottom:6px">
          ${step.label}
          ${step.result === 'PASS' ? ' <span style="margin-left:6px">✓ PROVED</span>' : ''}
          ${step.result === 'FAIL' ? ' <span style="margin-left:6px">✗ FAIL</span>' : ''}
        </div>
        <div style="font-size:13px;color:#333;overflow-x:auto">\\[${step.latex}\\]</div>
        ${step.residual ? `<details style="margin-top:6px"><summary style="font-size:11px;color:#dc2626;cursor:pointer">Non-zero residuals</summary><div style="font-size:11px;font-family:monospace;color:#555;padding:6px 0">${Object.entries(step.residual).map(([k,v])=>`${k}: \\(${v}\\)`).join('<br>')}</div></details>` : ''}
      `;
      stepsDiv.appendChild(el);
      // Trigger reflow for animation
      el.getBoundingClientRect();
      el.style.opacity = '1';

      if (window.MathJax) MathJax.typesetPromise([el]);
    }

    // Update button to show final result
    if (d.result === 'PASS') {
      btn.style.background = '#059669';
      btn.innerHTML = '✓ Flatness Proved';
    } else if (d.result === 'FAIL') {
      btn.style.background = '#dc2626';
      btn.innerHTML = '✗ Not Flat (with this formula)';
      btn.disabled = false;
    } else {
      btn.innerHTML = '○ Pending';
      btn.disabled = true;
    }

  } catch(e) {
    stepsDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:8px 0">Error: ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '🔬 Verify Symbolically';
  }
}

loadEntry();
</script>
