<script>
const API = 'https://cmfatlas-production.up.railway.app';

function polyToLatex(s) {
  if (!s) return '';
  s = s.replace(/\*\*(\d+)/g, (_, e) => `^{${e}}`);
  s = s.replace(/(-?\d+)\*([a-zA-Z])/g, '$1$2');
  s = s.replace(/([a-zA-Z\}])\*([a-zA-Z])/g, '$1$2');
  return s;
}

function splitLongPoly(latexStr, termsPerLine) {
  termsPerLine = termsPerLine || 4;
  const terms = [];
  let buf = '', depth = 0;
  for (let i = 0; i < latexStr.length; i++) {
    const c = latexStr[i];
    if (c === '{') { depth++; buf += c; }
    else if (c === '}') { depth--; buf += c; }
    else if (depth === 0 && (c === '+' || c === '-') && buf.trim()) {
      terms.push(buf.trim()); buf = c;
    } else { buf += c; }
  }
  if (buf.trim()) terms.push(buf.trim());
  if (terms.length <= termsPerLine) return latexStr;
  const lines = [];
  for (let i = 0; i < terms.length; i += termsPerLine)
    lines.push(terms.slice(i, i + termsPerLine).join(' '));
  return '\\begin{split} &' + lines.join('\\\\ \n&') + '\\end{split}';
}

function categoryBadge(cat) {
  if (!cat) return '';
  const map = {
    'reference':  '<span class="badge" style="background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1" title="Trivial / rational limit">Reference</span>',
    'interesting':'<span class="badge" style="background:#fefce8;color:#b45309;border:1px solid #fde68a" title="Converges to known transcendental or irrational">Interesting</span>',
    'discovery':  '<span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac" title="Higher-dimensional or Ramanujan-type">Discovery</span>',
  };
  return map[cat] || '';
}

function taxonomyBadge(n, m, p, peff) {
  const sizeColors = {2:'#0bb4aa',3:'#7c3aed',4:'#b45309',5:'#059669',6:'#2563eb',8:'#dc2626',10:'#9333ea'};
  const c = sizeColors[n] || '#64748b';
  let html = `<span style="display:inline-flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:4px 12px;font-family:monospace;font-size:12px">`;
  html += `<span style="font-weight:800;color:${c}" title="Matrix size">${n}\u00d7${n}</span>`;
  if (m) html += `<span style="color:#94a3b8;font-size:10px">\u00b7</span><span style="color:#475569" title="Matrix count (number of stepping matrices)">${m}&#8239;matrices</span>`;
  if (p) html += `<span style="color:#94a3b8;font-size:10px">\u00b7</span><span style="color:#b45309" title="Parameter dimension (independent scalar variables)">p\u200a=\u200a${p}</span>`;
  if (peff && peff !== p) html += `<span style="color:#94a3b8;font-size:10px">\u00b7</span><span style="color:#6b7280;font-size:11px" title="Effective dimension (gauge-reduced)">${peff}&#8239;eff</span>`;
  html += `</span>`;
  return html;
}

function certBadge(c) {
  if (!c) return '<span class="badge badge-grey">Unknown</span>';
  const map = {
    'A_plus':            '<span class="badge" style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d">A+ — Manually Verified</span>',
    'A_certified':       '<span class="badge badge-green">A — Formally Certified</span>',
    'B_verified_numeric':'<span class="badge badge-teal">B — Numerically Verified</span>',
    'C_scouting':        '<span class="badge badge-amber">C — Scouting</span>',
  };
  return map[c] || `<span class="badge badge-grey">${c}</span>`;
}

function renderMatrices(matrices, d) {
  if (!matrices || !matrices.length) {
    const isGauge = d && (d.agent_type || (d.source_category && d.source_category.toLowerCase().includes('gauge')));
    if (isGauge) {
      return `<div style="background:#fef9e7;border:1px solid #fcd34d;border-radius:8px;padding:14px 16px;font-size:13px;color:#78350f;line-height:1.6">
        <strong>Matrix entries not stored</strong> — This is a gauge-agent CMF (${d.agent_type || 'type unknown'}, ${d.matrix_size}×${d.matrix_size}). Only scores and fingerprints were written to the DB at ingestion; the symbolic matrix polynomials were not persisted.<br/>
        <span style="color:#94a3b8;font-size:12px;margin-top:4px;display:inline-block">To recover them, re-run the gauge agent on fingerprint <code style="background:#fef3c7;padding:0 4px;border-radius:3px">${d.fingerprint || '—'}</code> and backfill <code>canonical_payload.matrices</code>.</span>
      </div>`;
    }
    return '<div style="color:#aaa;font-size:13px;padding:8px 0">No matrix representation available.</div>';
  }
  const isLDU = matrices.some(mx => (mx.source||'').startsWith('ldu_'));

  // LDU factorization view
  if (isLDU) {
    const lduParts = matrices.map(mx => {
      const rows = mx.rows;
      const rowsLatex = rows.map(r => r.join(' & ')).join(' \\\\ ');
      const lbl = mx.label || `K${mx.index}`;
      return `<div style="margin-bottom:20px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:6px">${lbl}</div>
        <div style="overflow-x:auto;font-size:13px;color:#222">\\[${lbl} = \\begin{pmatrix}${rowsLatex}\\end{pmatrix}\\]</div>
      </div>`;
    });
    return `<div>
      <div style="font-size:12px;color:#64748b;padding:10px 14px;background:#f0fdfc;border:1px solid #b2ede9;border-radius:8px;margin-bottom:16px;line-height:1.7">
        <strong style="color:#0bb4aa">LDU Gauge Construction</strong> — \\(G(n) = L \\cdot D(n) \\cdot U\\) &nbsp; where \\(D(n)\\) is diagonal-linear in \\((${matrices[1]?.rows?.map((_,i)=>['x','y','z','w','v'][i]||`n_${i}`).join(',') || 'n'}))\\)<br/>
        \\(K_i(n) = G(n{+}e_i)\\;\\cdot\\;\\Delta_i(n_i)\\;\\cdot\\;G(n)^{-1}\\)  &nbsp; — path-independent by LDU gauge theorem
      </div>
      ${lduParts.join('')}
    </div>`;
  }

  const parts = matrices.map(mx => {
    const rows = mx.rows;
    const rowsLatex = rows.map(r => r.join(' & ')).join(' \\\\ ');
    const label = mx.label || `K${mx.index}`;
    const varList = matrices.length === 2 ? '(k,m)' : '(' + matrices.map(mm=>mm.axis).join(',') + ')';
    return `
      <div style="margin-bottom:24px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px">
          ${label}${varList} — ${mx.axis ? mx.axis.toUpperCase() : '?'} step matrix
          ${mx.source === 'explicit' || mx.source === 'symbolic' ? '<span style="margin-left:8px;font-size:9px;background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9;padding:1px 6px;border-radius:9999px;font-weight:600;text-transform:none">symbolic</span>' : '<span style="margin-left:8px;font-size:9px;background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;padding:1px 6px;border-radius:9999px;font-weight:600;text-transform:none">computed</span>'}
        </div>
        <div style="overflow-x:auto;font-size:13px;color:#222">
          \\[${label}${varList} = \\begin{pmatrix} ${rowsLatex} \\end{pmatrix}\\]
        </div>
      </div>`;
  });

  const mxLabels = matrices.map(mx => mx.label || `K${mx.index}`);
  let flatness = '';
  if (matrices.length === 2) {
    flatness = `\\(${mxLabels[0]}(k,m) \\cdot ${mxLabels[1]}(k{+}1,m) = ${mxLabels[1]}(k,m) \\cdot ${mxLabels[0]}(k,m{+}1)\\)`;
  } else if (matrices.length >= 3) {
    const pairs = [];
    for (let i = 0; i < matrices.length; i++)
      for (let j = i+1; j < matrices.length; j++)
        pairs.push(`\\(${mxLabels[i]} \\cdot ${mxLabels[j]} = ${mxLabels[j]} \\cdot ${mxLabels[i]}\\) (shifted)`);
    flatness = pairs.join(' &nbsp;&nbsp; ');
  }

  return `<div class="space-y-2">${parts.join('')}
    <div style="font-size:12px;color:#666;border:1px solid #e2e8f0;border-radius:8px;padding:12px;background:#f8fafc;margin-top:8px">
      <strong style="color:#333">Flatness condition:</strong> ${flatness}
    </div>
  </div>`;
}

function buildBibTeX(id, f_poly, dim) {
  const year = new Date().getFullYear();
  const slug = `cmf${id}`;
  return `@misc{vesterlund${year}cmf${id},
  author    = {Vesterlund, David},
  title     = {{CMF Atlas} Entry \\#${id}: ${f_poly ? f_poly.substring(0,40) : `Dimension ${dim} CMF`}},
  year      = {${year}},
  url       = {https://davidvesterlund.com/cmf-atlas/entry.html?id=${id}},
  note      = {CMF Atlas v2.2, Conservative Matrix Field Database},
  license   = {CC BY 4.0}
}`;
}

function buildTelescopeDerivation(d) {
  if (!d.f_poly || !d.matrices || d.matrices.length < 2) return '';
  const is3d = !!d.is_3d;
  const vars = is3d ? 'x,y,z' : 'x,y';
  const subst = is3d ? 'x\\to k,\\, y\\to m,\\, z\\to n' : 'x\\to k,\\, y\\to m';

  // Extract entries from matrices returned by API
  const K1 = d.matrices[0], K2 = d.matrices[1];
  const bk1_tex = K1.rows[1][0];   // b(k+1)
  const akm_tex = K1.rows[1][1];   // a(k,m)
  const gbar_tex = K2.rows[0][0];  // gbar(k,m)
  const bk_tex  = K2.rows[1][0];   // b(k)
  const g_tex   = K2.rows[1][1];   // g(k,m)

  const fpL = polyToLatex(d.f_poly);
  const fbL = polyToLatex(d.fbar_poly);

  return `
  <details style="margin-top:6px" onToggle="if(this.open&&window.MathJax)MathJax.typesetPromise([this])">
    <summary style="cursor:pointer;font-size:12px;font-weight:600;color:#0bb4aa;padding:10px 14px;background:#f0fdfc;border:1px solid #b2ede9;border-radius:8px;list-style:none;display:flex;align-items:center;gap:6px">
      <span style="font-size:14px">&#9654;</span> How are these matrices derived? &mdash; Telescope Construction
    </summary>
    <div style="padding:20px;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;background:#fafcff">

      <p style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.6">
        The K-matrices are built from the two conjugate polynomials \\(f\\) and \\(\\bar{f}\\) via the <strong>telescope construction</strong>:
      </p>

      <!-- Step 1 -->
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0bb4aa;margin-bottom:6px">Step 1 &mdash; Substitute variables</div>
        <div style="font-size:13px;color:#333;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px">
          \\[g(k,m) \\;=\\; f(${vars})\\big|_{${subst}} \\;=\\; ${fpL}\\bigl|_{${subst}}\\]
          \\[\\bar{g}(k,m) \\;=\\; \\bar{f}(${vars})\\big|_{${subst}} \\;=\\; ${fbL}\\bigl|_{${subst}}\\]
          <div style="margin-top:8px;font-size:12px;color:#555">
            giving \\(g(k,m) = ${g_tex}\\) and \\(\\bar{g}(k,m) = ${gbar_tex}\\)
          </div>
        </div>
      </div>

      <!-- Step 2 -->
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0bb4aa;margin-bottom:6px">Step 2 &mdash; Build b(k): the denominator polynomial</div>
        <div style="font-size:13px;color:#333;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px">
          Evaluate both polynomials at \\(m=0\\) and multiply:
          \\[b(k) \\;=\\; g(k,0)\\cdot\\bar{g}(k,0) \\;=\\; ${bk_tex}\\]
          Then shift by one step:
          \\[b(k+1) = ${bk1_tex}\\]
        </div>
      </div>

      <!-- Step 3 -->
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0bb4aa;margin-bottom:6px">Step 3 &mdash; Build a(k,m): the diagonal entry</div>
        <div style="font-size:13px;color:#333;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px">
          Subtract \\(\\bar{g}\\) evaluated at \\(k+1\\) from \\(g\\):
          \\[a(k,m) \\;=\\; g(k,m) - \\bar{g}(k+1,m) \\;=\\; ${akm_tex}\\]
        </div>
      </div>

      <!-- Step 4 -->
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0bb4aa;margin-bottom:6px">Step 4 &mdash; Assemble K&#8321; and K&#8322;</div>
        <div style="font-size:13px;color:#333;padding:10px 14px;background:#fff;border:1px solid #e2e8f0;border-radius:6px">
          <strong>K&#8321;</strong> walks along k using \\(b(k+1)\\) (one step ahead in k):
          \\[K_1(k,m) = \\begin{pmatrix} 0 & 1 \\\\ b(k+1) & a(k,m) \\end{pmatrix} = \\begin{pmatrix} 0 & 1 \\\\ ${bk1_tex} & ${akm_tex} \\end{pmatrix}\\]
          <div style="margin-top:12px"><strong>K&#8322;</strong> walks along m using \\(b(k)\\) and the full \\(g,\\, \\bar{g}\\):</div>
          \\[K_2(k,m) = \\begin{pmatrix} \\bar{g}(k,m) & 1 \\\\ b(k) & g(k,m) \\end{pmatrix} = \\begin{pmatrix} ${gbar_tex} & 1 \\\\ ${bk_tex} & ${g_tex} \\end{pmatrix}\\]
        </div>
      </div>

      <div style="font-size:12px;color:#888;margin-top:14px;padding:10px 14px;background:#f8fafc;border-radius:6px;border:1px solid #e2e8f0">
        <strong style="color:#333">Flatness:</strong> Path independence means \\(K_1(k,m)\\cdot K_2(k+1,m) = K_2(k,m)\\cdot K_1(k,m+1)\\) for all integers \\(k,m\\). This is what the Sage symbolic proof verifies exactly in \\(\\mathbb{Q}[k,m]\\).
      </div>
    </div>
  </details>`;
}

async function loadEntry() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) {
    document.getElementById('main-content').innerHTML =
      '<div class="text-red-400 py-12 text-center">No CMF ID specified. Use <code>?id=N</code> in the URL.</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/cmfs/${id}/full`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();

    document.title = `CMF #${d.id} — CMF Atlas`;
    const hasFormula = !!d.f_poly;
    const fpL = polyToLatex(d.f_poly);
    const fbL = polyToLatex(d.fbar_poly);
    const bibtex = buildBibTeX(d.id, d.f_poly, d.dimension);
    const matrixSize  = d.matrix_size  || d.dimension;
    const matrixCount = d.matrix_count;
    const paramDim    = d.parameter_dimension;
    const effDim      = d.effective_dimension;
    const displayDim  = matrixSize;

    const identConst = d.identified_constant;
    const identMethod = d.identification_method;
    const identDigits = d.identification_digits;
    const methodLabel = {'pconst':'Known','float':'Float match','pslq':'PSLQ','isc':'ISC','pf_pslq':'PF+PSLQ'}[identMethod] || (identMethod||'');

    document.getElementById('main-content').innerHTML = `
      <!-- Breadcrumb -->
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#888;margin-bottom:24px">
        <a href="browse.html" style="color:#0bb4aa;text-decoration:none;font-weight:500">Browse</a>
        <span>›</span>
        <span style="color:#333">CMF #${d.id}</span>
      </div>

      <!-- Header -->
      <div style="background:linear-gradient(135deg,#f0fdfc 0%,#fff 60%);border:1px solid #e2e8f0;border-radius:16px;padding:28px 28px 24px;margin-bottom:24px">
        <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px">
          <div>
            <h1 style="font-size:2rem;font-weight:800;color:#101010;margin-bottom:10px;letter-spacing:-0.5px">CMF #${d.id}</h1>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
              ${taxonomyBadge(matrixSize, matrixCount, paramDim, effDim)}
              ${categoryBadge(d.category)}
              ${certBadge(d.certification_level)}
              ${d.flatness_verified ? '<span class="badge badge-green">✓ Flatness Verified</span>' : ''}
              ${d.symbolic_verification?.result === 'PASS' ? '<span class="badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac">🔬 Symbolically Proven</span>' : ''}
              ${d.walk_available ? '<span class="badge" style="background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9">▶ Walkable</span>' : ''}
            </div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${d.walk_available ? `<a href="explorer.html?id=${d.id}" style="background:#0bb4aa;color:#fff;font-weight:600;padding:9px 18px;border-radius:8px;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px">▶ Matrix Walk</a>` : ''}
            ${hasFormula ? `<a href="conservative-test.html?id=${d.id}" style="border:2px solid #0bb4aa;color:#0bb4aa;font-weight:600;padding:8px 16px;border-radius:8px;font-size:13px;text-decoration:none;background:#fff">Flatness Test</a>` : ''}
          </div>
        </div>
      </div>

function injectJsonLD(d) {
  const existing = document.getElementById('entry-jsonld');
  if (existing) existing.remove();
  const el = document.createElement('script');
  el.id = 'entry-jsonld';
  el.type = 'application/ld+json';
  const entryUri = `https://davidvesterlund.com/cmf-atlas/entry.html?id=${d.id}`;
  el.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Dataset",
    "name": `CMF Atlas Entry #${d.id}`,
    "description": `Conservative Matrix Field #${d.id}: ${d.dimension}D, ${d.primary_constant || 'unidentified'}, ${d.certification_level || 'unknown certification'}.`,
    "identifier": `cmf-atlas-entry-${d.id}`,
    "url": entryUri,
    "license": "https://creativecommons.org/licenses/by/4.0/",
    "version": "2.3",
    "creator": {"@type": "Person", "name": "David Vesterlund"},
    "isPartOf": {"@type": "Dataset", "name": "CMF Atlas", "url": "https://davidvesterlund.com/cmf-atlas/"},
    "keywords": ["Conservative Matrix Field", "CMF", d.primary_constant, `${d.dimension}D`, d.certification_level].filter(Boolean),
    "additionalProperty": [
      {"@type": "PropertyValue", "name": "dimension",           "value": d.dimension},
      {"@type": "PropertyValue", "name": "proof_status",        "value": d.proof_status || "unverified"},
      {"@type": "PropertyValue", "name": "identification_status","value": d.identification_status || "unidentified"},
      {"@type": "PropertyValue", "name": "construction_type",   "value": d.construction_type || ""},
      {"@type": "PropertyValue", "name": "source_family",       "value": d.source_family || d.source_category || ""},
      {"@type": "PropertyValue", "name": "release_version",     "value": "2.3"},
    ]
  });
  document.head.appendChild(el);
  let canon = document.querySelector('link[rel="canonical"]');
  if (!canon) { canon = document.createElement('link'); canon.rel = 'canonical'; document.head.appendChild(canon); }
  canon.href = entryUri;
  document.title = `CMF #${d.id} — ${d.primary_constant || 'CMF'} (${d.matrix_size || d.dimension}D) — CMF Atlas`;
}

async function loadRelations(cmfId) {
  const rel = await fetch(`${API}/cmfs/${cmfId}/relations`).then(r => r.json()).catch(() => null);
  if (!rel) return;
  const panel = document.getElementById('relations-panel');
  if (!panel) return;
  const lc = rel.linked_constant;
  const re = rel.related_entries || [];
  panel.innerHTML = `
    <div class="section-label">Related Objects</div>
    ${lc ? `
    <div style="margin-bottom:10px">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px">Linked Constant</div>
      <a href="constants.html#${lc.id}" style="color:#0bb4aa;font-weight:600;font-size:13px;text-decoration:none">
        \\(${lc.latex}\\) — ${lc.label}
      </a>
      <div style="font-size:11px;color:#aaa;margin-top:2px">irrationality: ${lc.irrationality_status || '—'} &nbsp;|&nbsp; transcendence: ${lc.transcendence_status || '—'}</div>
    </div>
    ` : ''}
    ${re.length ? `
    <div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:4px">Related Entries (same constant)</div>
      ${re.map(r => `<div style="font-size:12px;margin-bottom:4px"><a href="entry.html?id=${r.id}" style="color:#0bb4aa;text-decoration:none;font-weight:600">#${r.id}</a> <span style="color:#aaa">${r.dimension}D · ${r.certification_level || ''}</span></div>`).join('')}
    </div>` : ''}
    ${!lc && !re.length ? '<div style="color:#aaa;font-size:12px">No linked objects found.</div>' : ''}
  `;
  if (window.MathJax) MathJax.typesetPromise([panel]);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = '#0bb4aa';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

function copyBibTeX() {
  const text = document.getElementById('bibtex-block').textContent;
  const btn = document.getElementById('bibtex-copy-btn');
  copyText(text, btn);
}

async function runSymVerify(cmfId) {
  const btn = document.getElementById('symverify-btn');
  const stepsDiv = document.getElementById('symverify-steps');
  if (!btn || !stepsDiv) return;

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⏳</span> Computing…';
  stepsDiv.innerHTML = '<div style="color:#aaa;font-size:12px;padding:8px 0">Running sympy — exact polynomial arithmetic in ℚ[k,m]…</div>';

  try {
    const res = await fetch(`${API}/cmfs/${cmfId}/verify-steps`);
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    const d = await res.json();

    stepsDiv.innerHTML = '';
    stepsDiv.style.marginTop = '20px';

    // Reveal steps one by one
    for (let i = 0; i < d.steps.length; i++) {
      await new Promise(r => setTimeout(r, i === 0 ? 0 : 320));
      const step = d.steps[i];
      const isResult = step.result === 'PASS' || step.result === 'FAIL' || step.result === 'PENDING';
      const bg = step.result === 'PASS' ? '#f0fdf4' : step.result === 'FAIL' ? '#fef2f2' : '#f8fafc';
      const border = step.result === 'PASS' ? '#86efac' : step.result === 'FAIL' ? '#fca5a5' : '#e2e8f0';
      const color = step.result === 'PASS' ? '#15803d' : step.result === 'FAIL' ? '#dc2626' : '#64748b';

      const el = document.createElement('div');
      el.style.cssText = `opacity:0;transition:opacity .3s ease;margin-bottom:14px;padding:12px 16px;border-radius:8px;border:1px solid ${border};background:${bg}`;
      el.innerHTML = `
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${isResult ? color : '#888'};margin-bottom:6px">
          ${step.label}
          ${step.result === 'PASS' ? ' <span style="margin-left:6px">✓ PROVED</span>' : ''}
          ${step.result === 'FAIL' ? ' <span style="margin-left:6px">✗ FAIL</span>' : ''}
        </div>
        <div style="font-size:13px;color:#333;overflow-x:auto">\\[${step.latex}\\]</div>
        ${step.residual ? `<details style="margin-top:6px"><summary style="font-size:11px;color:#dc2626;cursor:pointer">Non-zero residuals</summary><div style="font-size:11px;font-family:monospace;color:#555;padding:6px 0">${Object.entries(step.residual).map(([k,v])=>`${k}: \\(${v}\\)`).join('<br>')}</div></details>` : ''}
      `;
      stepsDiv.appendChild(el);
      // Trigger reflow for animation
      el.getBoundingClientRect();
      el.style.opacity = '1';

      if (window.MathJax) MathJax.typesetPromise([el]);
    }

    // Update button to show final result
    if (d.result === 'PASS') {
      btn.style.background = '#059669';
      btn.innerHTML = '✓ Flatness Proved';
    } else if (d.result === 'FAIL') {
      btn.style.background = '#dc2626';
      btn.innerHTML = '✗ Not Flat (with this formula)';
      btn.disabled = false;
    } else {
      btn.innerHTML = '○ Pending';
      btn.disabled = true;
    }

  } catch(e) {
    stepsDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:8px 0">Error: ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = '🔬 Verify Symbolically';
  }
}

const HEURISTIC_COLORS = ['#0bb4aa','#f59e0b','#7c3aed'];
const entryHeuristicCharts = {};

async function runEntryHeuristic(cmfId) {
  const depth = document.getElementById(`heuristic-depth-${cmfId}`).value;
  const btn = document.getElementById(`heuristic-btn-${cmfId}`);
  const status = document.getElementById(`heuristic-status-${cmfId}`);
  const chartWrap = document.getElementById(`heuristic-chart-wrap-${cmfId}`);
  const result = document.getElementById(`heuristic-result-${cmfId}`);

  btn.disabled = true;
  btn.textContent = '⏳ Running…';
  status.textContent = 'Running trajectories m = 0, 1, 2…';
  chartWrap.style.display = 'none';
  result.innerHTML = '';

  try {
    const fetches = [0, 1, 2].map(m => {
      const p = new URLSearchParams({ depth, direction: 'x', m_fixed: m, n_fixed: 1 });
      return fetch(`${API}/cmfs/${cmfId}/walk?${p}`).then(r => r.json());
    });
    const results = await Promise.all(fetches);
    const valid = results.filter(r => r && r.sequence && r.sequence.length);

    if (!valid.length) {
      status.innerHTML = '<span style="color:#ef4444">All walks failed — this CMF may not support polynomial-form walks.</span>';
      return;
    }

    // Chart
    const datasets = valid.map((d, i) => {
      const finite = d.sequence.filter(s => s.value !== null);
      return {
        label: `Kx, m=${i}`,
        data: finite.map(s => ({x: s.step, y: s.value})),
        borderColor: HEURISTIC_COLORS[i], backgroundColor: HEURISTIC_COLORS[i]+'20',
        borderWidth: 2, pointRadius: 0, tension: 0.1, fill: false,
      };
    });
    chartWrap.style.display = '';
    if (entryHeuristicCharts[cmfId]) entryHeuristicCharts[cmfId].destroy();
    entryHeuristicCharts[cmfId] = new Chart(document.getElementById(`heuristic-chart-${cmfId}`), {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: true,
        animation: { duration: 200 }, parsing: false,
        plugins: { legend: { labels: { color:'#555', font:{size:11} } } },
        scales: {
          x: { type:'linear', ticks:{color:'#888',maxTicksLimit:8}, grid:{color:'#f1f5f9'},
               title:{display:true,text:'Step k',color:'#888',font:{size:11}} },
          y: { ticks:{color:'#888'}, grid:{color:'#f1f5f9'},
               title:{display:true,text:'Convergent',color:'#888',font:{size:11}} }
        }
      }
    });

    // Summary table
    const ests = valid.map(d => d.best_estimate).filter(v => v != null);
    const spread = ests.length > 1 ? Math.max(...ests) - Math.min(...ests) : 0;
    const isFlat = spread < 1e-4;

    const rows = valid.map((d, i) => {
      const be = d.best_estimate;
      return `<tr style="border-bottom:1px solid #f1f5f9">
        <td style="padding:6px 14px 6px 0;color:${HEURISTIC_COLORS[i]};font-weight:700">m = ${i}</td>
        <td style="padding:6px 14px 6px 0;font-family:monospace;font-size:12px">${be != null ? be.toPrecision(12) : '—'}</td>
        <td style="padding:6px 0;font-size:11px;color:#888">${d.self_delta_bits_per_step != null ? 'δ = '+d.self_delta_bits_per_step.toFixed(3)+' bits/step' : ''}</td>
      </tr>`;
    }).join('');

    const verdictHtml = isFlat
      ? `<div style="margin-top:12px;padding:10px 14px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;font-size:12px;color:#15803d"><strong>✓ Trajectories agree</strong> — spread = ${spread.toExponential(2)} at depth ${depth}. Empirical evidence consistent with path-independence.</div>`
      : `<div style="margin-top:12px;padding:10px 14px;background:#fef9e7;border:1px solid #fcd34d;border-radius:8px;font-size:12px;color:#92400e"><strong>⚠ Spread = ${spread.toExponential(2)}</strong> — trajectories have not yet converged at this depth. Try increasing depth; 3D CMFs converge slowly.</div>`;

    result.innerHTML = `
      <table style="width:100%;font-size:13px;border-collapse:collapse;margin-top:4px">
        <thead><tr style="border-bottom:2px solid #e2e8f0;color:#888;font-size:10px">
          <th style="text-align:left;padding:6px 14px 6px 0;text-transform:uppercase;letter-spacing:.06em">Trajectory</th>
          <th style="text-align:left;padding:6px 14px 6px 0;text-transform:uppercase;letter-spacing:.06em">Best estimate (depth ${depth})</th>
          <th style="text-align:left;padding:6px 0;text-transform:uppercase;letter-spacing:.06em">Rate</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      ${verdictHtml}`;

    status.innerHTML = `<span style="background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600">${valid.length} walks complete</span>`;
  } catch(e) {
    status.innerHTML = `<span style="color:#ef4444">Error: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Run Heuristic Test';
  }
}

loadEntry();
</script>
