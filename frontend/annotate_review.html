<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Review — CMF Annotator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{font-family:'Inter',sans-serif}
    body{background:#f8fafc;color:#101010}
    .nav-link{color:#555;font-size:14px;font-weight:500;transition:color .15s;text-decoration:none}
    .nav-link:hover,.nav-link.active{color:#0bb4aa}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:700}
    .badge-draft{background:#fef9e7;color:#b45309;border:1px solid #fcd34d}
    .badge-submitted{background:#e0faf8;color:#0bb4aa;border:1px solid #b2ede9}
    .badge-reviewed{background:#e6f9f0;color:#059669;border:1px solid #a7f3d0}
    .badge-adjudicated{background:#f3f0ff;color:#7c3aed;border:1px solid #c4b5fd}
    .row-item{display:contents}
    .row-item > *{padding:11px 12px;border-bottom:1px solid #f1f5f9;font-size:12.5px;vertical-align:middle}
    .row-item:hover > *{background:#f0fdfc}
    .filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e2e8f0;background:#fff;color:#555;font-family:inherit;transition:all .15s}
    .filter-btn.active{background:#0bb4aa;color:#fff;border-color:#0bb4aa}
    .filter-btn:hover:not(.active){border-color:#0bb4aa;color:#0bb4aa}
    .export-btn{background:#fff;border:1px solid #e2e8f0;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;color:#475569}
    .export-btn:hover{border-color:#0bb4aa;color:#0bb4aa}
    .conf-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
  </style>
</head>
<body class="min-h-screen">

<nav style="background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between" style="height:60px">
    <a href="index.html" style="font-weight:800;font-size:18px;color:#101010;text-decoration:none;letter-spacing:-0.5px">
      CMF <span style="color:#0bb4aa">Atlas</span>
      <span style="color:#94a3b8;font-size:13px;font-weight:400;margin-left:8px">/ Annotator</span>
    </a>
    <div class="flex items-center gap-6">
      <a href="annotate_queue.html" class="nav-link">Queue</a>
      <a href="annotate_review.html" class="nav-link active">Review</a>
      <a href="annotate_compare.html" class="nav-link">Compare</a>
      <a href="annotate_protocol.html" class="nav-link">Protocol</a>
      <button id="logout-btn" style="font-size:13px;color:#94a3b8;background:none;border:none;cursor:pointer;font-family:inherit">Sign out</button>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <h1 style="font-size:22px;font-weight:800">Your annotations</h1>
    <div class="flex items-center gap-2">
      <button class="export-btn" id="export-json-btn">↓ JSON</button>
      <button class="export-btn" id="export-csv-btn">↓ CSV</button>
    </div>
  </div>

  <!-- Status filters -->
  <div class="flex items-center gap-2 flex-wrap mb-5">
    <button class="filter-btn active" data-status="all">All</button>
    <button class="filter-btn" data-status="draft">Draft</button>
    <button class="filter-btn" data-status="submitted">Submitted</button>
    <button class="filter-btn" data-status="reviewed">Reviewed</button>
  </div>

  <!-- Table -->
  <div class="card">
    <div style="padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:600" id="result-count">Loading…</span>
      <div class="flex items-center gap-2">
        <button id="prev-btn" class="filter-btn" style="padding:4px 12px">←</button>
        <span id="page-label" style="font-size:12px;color:#94a3b8"></span>
        <button id="next-btn" class="filter-btn" style="padding:4px 12px">→</button>
      </div>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;background:#f8fafc">
          <th style="padding:8px 12px;text-align:left">CMF ID</th>
          <th style="padding:8px 12px;text-align:left">Matrices</th>
          <th style="padding:8px 12px;text-align:left">Signature</th>
          <th style="padding:8px 12px;text-align:left">Variables</th>
          <th style="padding:8px 12px;text-align:left">Denom</th>
          <th style="padding:8px 12px;text-align:left">Max exp</th>
          <th style="padding:8px 12px;text-align:left">Status</th>
          <th style="padding:8px 12px;text-align:left">Confidence</th>
          <th style="padding:8px 12px;text-align:left">Updated</th>
          <th style="padding:8px 12px;text-align:left">Actions</th>
        </tr>
      </thead>
      <tbody id="review-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const API = 'https://cmfatlas-production.up.railway.app';
const PAGE_SIZE = 50;
let page = 0;
let statusFilter = null;

function statusBadge(s) {
  const cls = {draft:'badge-draft',submitted:'badge-submitted',reviewed:'badge-reviewed',adjudicated:'badge-adjudicated'}[s]||'badge-draft';
  return `<span class="badge ${cls}">${s}</span>`;
}
function confColor(c) {
  if (!c) return '#94a3b8';
  if (c >= 4) return '#059669';
  if (c >= 3) return '#0bb4aa';
  if (c >= 2) return '#b45309';
  return '#dc2626';
}

async function load() {
  const tbody = document.getElementById('review-tbody');
  tbody.innerHTML = `<tr><td colspan="10" style="padding:32px;text-align:center;color:#94a3b8;font-size:13px">Loading…</td></tr>`;
  const params = new URLSearchParams({limit: PAGE_SIZE, offset: page * PAGE_SIZE});
  if (statusFilter) params.set('status', statusFilter);
  try {
    const r = await fetch(API+'/annotate/annotations?'+params, {
      credentials:'include', headers:{'X-Token': localStorage.getItem('annotator_token')||''}
    });
    if (r.status===401) { window.location.href='annotate_login.html'; return; }
    const d = await r.json();
    document.getElementById('result-count').textContent = `${d.total} annotation${d.total!==1?'s':''}`;
    document.getElementById('page-label').textContent = `${page+1} / ${Math.max(1,Math.ceil(d.total/PAGE_SIZE))}`;
    document.getElementById('prev-btn').disabled = page===0;
    document.getElementById('next-btn').disabled = d.items.length < PAGE_SIZE;

    if (!d.items.length) {
      tbody.innerHTML = `<tr><td colspan="10" style="padding:40px;text-align:center;color:#94a3b8;font-size:13px">No annotations yet. <a href="annotate_queue.html" style="color:#0bb4aa">Open the queue →</a></td></tr>`;
      return;
    }
    tbody.innerHTML = d.items.map(a => {
      const vars = (a.visible_variables ? JSON.parse(a.visible_variables||'[]') : []);
      const varStr = Array.isArray(vars) ? vars.join(', ') : (vars||'—');
      const denom = a.has_denominator ? (a.has_variable_in_denominator ? 'var' : 'const') : 'none';
      return `<tr class="row-item" style="cursor:pointer">
        <td><a href="annotate_cmf.html?id=${a.cmf_id}" style="color:#0bb4aa;font-weight:700;text-decoration:none">#${a.cmf_id}</a></td>
        <td>${a.matrix_count||'—'}</td>
        <td style="font-family:monospace;font-size:11px">${a.matrix_size_signature||'—'}</td>
        <td style="color:#475569">${varStr||'—'}</td>
        <td>${denom}</td>
        <td>${a.highest_visible_exponent??'—'}</td>
        <td>${statusBadge(a.status)}</td>
        <td><span class="conf-dot" style="background:${confColor(a.confidence)}"></span>${a.confidence||'—'}/5</td>
        <td style="color:#94a3b8">${a.updated_at ? a.updated_at.substring(0,10) : '—'}</td>
        <td><a href="annotate_cmf.html?id=${a.cmf_id}" style="color:#0bb4aa;font-size:12px;font-weight:600;text-decoration:none">Edit →</a></td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="10" style="padding:24px;color:#dc2626;font-size:13px">${e.message}</td></tr>`;
  }
}

document.querySelectorAll('.filter-btn[data-status]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-status]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    statusFilter = btn.dataset.status === 'all' ? null : btn.dataset.status;
    page = 0; load();
  });
});
document.getElementById('prev-btn').addEventListener('click', () => { if(page>0){page--;load();} });
document.getElementById('next-btn').addEventListener('click', () => { page++; load(); });

document.getElementById('export-json-btn').addEventListener('click', () => {
  window.open(API+'/annotate/export/json', '_blank');
});
document.getElementById('export-csv-btn').addEventListener('click', () => {
  window.open(API+'/annotate/export/csv', '_blank');
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch(API+'/annotate/logout', {method:'POST',credentials:'include'});
  localStorage.clear(); window.location.href='annotate_login.html';
});

(async () => {
  const token = localStorage.getItem('annotator_token');
  if (!token) { window.location.href='annotate_login.html'; return; }
  load();
})();
</script>
</body>
</html>
