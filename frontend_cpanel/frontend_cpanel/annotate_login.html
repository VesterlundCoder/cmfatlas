<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — CMF Annotator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <style>
    *{font-family:'Inter',sans-serif}
    body{background:#f8fafc;color:#101010}
    .input{width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s;background:#fff;color:#101010}
    .input:focus{border-color:#0bb4aa;box-shadow:0 0 0 3px rgba(11,180,170,.1)}
    .btn-primary{background:#0bb4aa;color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;width:100%}
    .btn-primary:hover{background:#09a09a}
    .btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
    .error{color:#dc2626;font-size:13px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;display:none}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

<div style="width:380px">
  <div class="text-center mb-8">
    <a href="index.html" style="font-weight:800;font-size:22px;color:#101010;text-decoration:none;letter-spacing:-0.5px">
      CMF <span style="color:#0bb4aa">Annotator</span>
    </a>
    <p style="color:#64748b;font-size:13px;margin-top:6px">Private expert workspace · CMF Atlas Classification</p>
  </div>

  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.06)">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">Sign in</h2>

    <div id="error-box" class="error mb-4"></div>

    <form id="login-form">
      <div class="mb-4">
        <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Email</label>
        <input id="email" type="email" class="input" placeholder="you@example.com" autocomplete="username" required/>
      </div>
      <div class="mb-6">
        <label style="font-size:12px;font-weight:600;color:#475569;display:block;margin-bottom:6px">Password</label>
        <input id="password" type="password" class="input" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button id="login-btn" type="submit" class="btn-primary">Sign in</button>
    </form>
  </div>

  <p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:20px">
    Access is by invitation only. Contact the admin to request an account.
  </p>
</div>

<script>
const API = 'https://cmfatlas-production.up.railway.app';

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-box');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const resp = await fetch(API + '/annotate/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      })
    });
    if (!resp.ok) {
      const d = await resp.json();
      throw new Error(d.detail || 'Login failed');
    }
    const data = await resp.json();
    localStorage.setItem('annotator_token', data.token);
    localStorage.setItem('annotator_user', JSON.stringify(data.user));
    window.location.href = 'annotate_queue.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

(async () => {
  const token = localStorage.getItem('annotator_token');
  if (token) {
    try {
      const r = await fetch(API + '/annotate/me', {credentials:'include', headers:{'X-Token': token}});
      if (r.ok) window.location.href = 'annotate_queue.html';
    } catch {}
  }
})();
</script>
</body>
</html>
